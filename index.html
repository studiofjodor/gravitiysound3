<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Stereo Nebula | Audio Gravity</title>
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; background:#000; color:#fff; font-family: system-ui, sans-serif; }
    #root { position:fixed; inset:0; }
    canvas { display:block; }

    #overlay {
      position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); z-index: 50; transition: opacity 0.8s ease;
    }
    #overlay.hidden { opacity: 0; pointer-events: none; }
    
    .title { font-size: 24px; font-weight: 200; letter-spacing: 0.2em; margin-bottom: 10px; text-transform: uppercase; }
    .subtitle { font-size: 11px; letter-spacing: 0.1em; color: #888; margin-bottom: 40px; }
    
    button {
      padding: 14px 40px; background: transparent; border: 1px solid rgba(255,255,255,0.3); color: #fff;
      font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; border-radius: 4px;
      cursor: pointer; transition: all 0.3s;
    }
    button:hover { background: #fff; color: #000; box-shadow: 0 0 20px rgba(255,255,255,0.5); }

    .hud {
      position: fixed; bottom: 20px; left: 20px; font-size: 10px; letter-spacing: 0.15em;
      color: rgba(255,255,255,0.5); text-transform: uppercase; pointer-events: none;
    }
    
    .stereo-meters {
      position: fixed; bottom: 20px; right: 20px; display: flex; gap: 20px; pointer-events: none;
    }
    .meter-col { display: flex; flex-direction: column; gap: 4px; align-items: center; }
    .meter-label { font-size: 9px; letter-spacing: 2px; color: #777; }
    .bar { width: 4px; height: 60px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; position: relative; }
    .fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: #fff; transition: height 0.05s; }
    .fill.left { background: #00f0ff; box-shadow: 0 0 10px #00f0ff; }
    .fill.right { background: #ff0055; box-shadow: 0 0 10px #ff0055; }
  </style>
</head>
<body>

  <div id="root"></div>

  <div id="overlay">
    <div class="title">Stereo Nebula</div>
    <div class="subtitle">Binaural Gravity Simulation</div>
    <button id="startBtn">Enable Audio</button>
  </div>

  <div class="hud">
    Drag to orbit · Scroll to zoom<br><br>
    Particles: 50,000
  </div>

  <div class="stereo-meters">
    <div class="meter-col">
      <div class="bar"><div class="fill left" id="meterL"></div></div>
      <div class="meter-label">L</div>
    </div>
    <div class="meter-col">
      <div class="bar"><div class="fill right" id="meterR"></div></div>
      <div class="meter-label">R</div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";

    // --- CONFIG ---
    const NUM_PARTICLES = 50000;
    const BOUNDS = 400;
    
    // --- THREE.JS SETUP ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000000, 0.001);

    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 2000);
    camera.position.set(0, 150, 400);

    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(2, window.devicePixelRatio));
    document.getElementById("root").appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.04;
    controls.autoRotate = true; controls.autoRotateSpeed = 0.5;

    // --- POST PROCESSING (BLOOM) ---
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.8, 0.5, 0.1);
    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // --- PROCEDURAL PARTICLE TEXTURE ---
    function createCircleTexture() {
      const canvas = document.createElement('canvas'); canvas.width = 32; canvas.height = 32;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
      gradient.addColorStop(0, 'rgba(255,255,255,1)');
      gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
      gradient.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gradient; ctx.fillRect(0, 0, 32, 32);
      return new THREE.CanvasTexture(canvas);
    }

    // --- PARTICLE SYSTEM ---
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(NUM_PARTICLES * 3);
    const velocities = new Float32Array(NUM_PARTICLES * 3);
    const colors = new Float32Array(NUM_PARTICLES * 3);
    const bases = new Float32Array(NUM_PARTICLES); // Zur individuellen Variation

    const colorLeft = new THREE.Color(0x00f0ff);  // Cyan
    const colorRight = new THREE.Color(0xff0055); // Magenta/Pink

    for (let i = 0; i < NUM_PARTICLES; i++) {
      // Initiale Verteilung: Eine Art Galaxie-Scheibe
      const radius = Math.random() * BOUNDS;
      const theta = Math.random() * Math.PI * 2;
      const yStr = (Math.random() - 0.5) * (BOUNDS * 0.1);
      
      positions[i*3]   = Math.cos(theta) * radius;
      positions[i*3+1] = yStr;
      positions[i*3+2] = Math.sin(theta) * radius;

      // Start-Farbe (Mix)
      colors[i*3] = 0.5; colors[i*3+1] = 0.5; colors[i*3+2] = 0.5;
      bases[i] = Math.random();
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 1.5,
      map: createCircleTexture(),
      vertexColors: true,
      transparent: true,
      opacity: 0.8,
      depthWrite: false,
      blending: THREE.AdditiveBlending
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // --- AUDIO SETUP (STEREO SPLIT) ---
    let audioCtx, analyserL, analyserR, dataL, dataR;
    let audioRunning = false;
    let bandsL = { sub: 0, mid: 0, high: 0 }, bandsR = { sub: 0, mid: 0, high: 0 };

    document.getElementById('startBtn').addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioCtx = new AudioContext();
        
        const source = audioCtx.createMediaStreamSource(stream);
        const splitter = audioCtx.createChannelSplitter(2);
        
        analyserL = audioCtx.createAnalyser(); analyserL.fftSize = 512; analyserL.smoothingTimeConstant = 0.85;
        analyserR = audioCtx.createAnalyser(); analyserR.fftSize = 512; analyserR.smoothingTimeConstant = 0.85;

        source.connect(splitter);
        splitter.connect(analyserL, 0); // Kanal 0 (Links)
        splitter.connect(analyserR, 1); // Kanal 1 (Rechts)

        dataL = new Uint8Array(analyserL.frequencyBinCount);
        dataR = new Uint8Array(analyserR.frequencyBinCount);
        
        audioRunning = true;
        document.getElementById('overlay').classList.add('hidden');
      } catch (err) {
        alert('Mikrofonzugriff benötigt!\n' + err.message);
      }
    });

    function getBands(data) {
      const avg = (start, end) => {
        let sum = 0; for (let i = start; i < end; i++) sum += data[i];
        return (sum / (end - start)) / 255;
      };
      return { sub: avg(1, 4), mid: avg(10, 40), high: avg(80, 160) }; // Angepasste Bins für FFT 512
    }

    // --- PHYSICS & ANIMATION LOOP ---
    const clock = new THREE.Clock();
    
    // Positionen der Stereo-Attraktoren
    const attL = new THREE.Vector3(-150, 0, 0);
    const attR = new THREE.Vector3(150, 0, 0);

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(clock.getDelta(), 0.05); // Cap delta to prevent explosions
      const time = clock.getElapsedTime();

      if (audioRunning) {
        analyserL.getByteFrequencyData(dataL);
        analyserR.getByteFrequencyData(dataR);
        bandsL = getBands(dataL);
        bandsR = getBands(dataR);

        // UI Updates
        document.getElementById('meterL').style.height = `${bandsL.sub * 100}%`;
        document.getElementById('meterR').style.height = `${bandsR.sub * 100}%`;
      }

      const pos = geometry.attributes.position.array;
      const col = geometry.attributes.color.array;

      // Basis-Gravitation + Audio Boost
      const baseG = 1500;
      const massL = baseG + (bandsL.sub * 15000); 
      const massR = baseG + (bandsR.sub * 15000);
      
      // Wirbelkraft (Tangential) gesteuert durch Mitten
      const swirlL = 0.5 + bandsL.mid * 3.0;
      const swirlR = 0.5 + bandsR.mid * 3.0;

      // Turbulenz durch Höhen
      const noiseLevel = (bandsL.high + bandsR.high) * 0.5;

      const up = new THREE.Vector3(0, 1, 0);
      const pVec = new THREE.Vector3();
      const dirL = new THREE.Vector3();
      const dirR = new THREE.Vector3();
      const crossL = new THREE.Vector3();
      const crossR = new THREE.Vector3();

      for (let i = 0; i < NUM_PARTICLES; i++) {
        const i3 = i * 3;
        pVec.set(pos[i3], pos[i3+1], pos[i3+2]);

        // --- PHYSICS: ATTRACTOR LEFT ---
        dirL.subVectors(attL, pVec);
        const distSqL = dirL.lengthSq() + 500; // +500 Softening (verhindert Unendlichkeit)
        const fL = massL / distSqL;
        dirL.normalize();
        
        // --- PHYSICS: ATTRACTOR RIGHT ---
        dirR.subVectors(attR, pVec);
        const distSqR = dirR.lengthSq() + 500;
        const fR = massR / distSqR;
        dirR.normalize();

        // --- TANGENTIAL FORCES (SWIRL) ---
        crossL.crossVectors(dirL, up).normalize().multiplyScalar(swirlL * fL);
        crossR.crossVectors(dirR, up).normalize().multiplyScalar(swirlR * fR);

        // --- APPLY FORCES TO VELOCITY ---
        // Anziehung + Wirbel
        velocities[i3]   += (dirL.x * fL + crossL.x + dirR.x * fR + crossR.x) * delta;
        velocities[i3+1] += (dirL.y * fL + crossL.y + dirR.y * fR + crossR.y) * delta;
        velocities[i3+2] += (dirL.z * fL + crossL.z + dirR.z * fR + crossR.z) * delta;

        // Turbulenz (Zittern bei Hi-Hats/Höhen)
        if (noiseLevel > 0.1) {
          velocities[i3]   += (Math.random() - 0.5) * noiseLevel * 2;
          velocities[i3+1] += (Math.random() - 0.5) * noiseLevel * 2;
          velocities[i3+2] += (Math.random() - 0.5) * noiseLevel * 2;
        }

        // Dämpfung (Friction im Raum)
        velocities[i3]   *= 0.96;
        velocities[i3+1] *= 0.96;
        velocities[i3+2] *= 0.96;

        // Position updaten
        pos[i3]   += velocities[i3];
        pos[i3+1] += velocities[i3+1];
        pos[i3+2] += velocities[i3+2];

        // --- COLOR BLENDING BASED ON INFLUENCE ---
        // Finde heraus, ob Partikel eher von Links oder Rechts beeinflusst wird
        const influenceRatio = fL / (fL + fR + 0.0001); // 1 = voll Links, 0 = voll Rechts
        
        // Mische die Farben sanft
        col[i3]   += ( (colorLeft.r * influenceRatio + colorRight.r * (1 - influenceRatio)) - col[i3] ) * 0.1;
        col[i3+1] += ( (colorLeft.g * influenceRatio + colorRight.g * (1 - influenceRatio)) - col[i3+1] ) * 0.1;
        col[i3+2] += ( (colorLeft.b * influenceRatio + colorRight.b * (1 - influenceRatio)) - col[i3+2] ) * 0.1;
        
        // Helligkeit basierend auf Geschwindigkeit
        const speed = Math.sqrt(velocities[i3]**2 + velocities[i3+1]**2 + velocities[i3+2]**2);
        const glow = Math.min(speed * 0.2, 1.0);
        col[i3]   += glow * 0.2;
        col[i3+1] += glow * 0.2;
        col[i3+2] += glow * 0.2;
      }

      geometry.attributes.position.needsUpdate = true;
      geometry.attributes.color.needsUpdate = true;

      controls.update();
      composer.render(); // WICHTIG: Composer statt Renderer nutzen für Bloom!
    }

    window.addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight);
    });

    animate();
  </script>
</body>
</html>
